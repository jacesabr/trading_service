# Render blueprint — push this repo to GitHub, then Render -> New -> Blueprint.
# Provisions: 1 free web (dashboard) + 1 paid worker (runner) + 1 cron (resolver).
# Set DATABASE_URL (Neon pooled), the broker keys, ANTHROPIC/NVIDIA in each service.
services:
  - type: web
    name: signal-dashboard
    runtime: python
    plan: free
    region: frankfurt            # any region ok for the dashboard
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn dashboard_db:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SIZE_USD
        value: "100"

  - type: worker
    name: signal-runner
    runtime: python
    plan: starter                # workers require a paid plan (~$7/mo)
    region: frankfurt            # MUST be non-US — Binance blocks US IPs (HTTP 451)
    buildCommand: pip install -r requirements.txt
    startCommand: python runner.py
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  # The heartbeat that keeps the TradingView-ideas book ALIVE: every 30 min it
  # places any `extracted` ideas (atomic broker brackets), fills resting orders,
  # resolves open positions and runs the broker-reconciliation audit — the step
  # that was missing (daily.py was never scheduled, so the book went stale for
  # days). Deterministic, no LLM. Bybit demo + Alpaca paper validate from any
  # region. The chart-read/scrape stays manual (tradingview_automation_run.md).
  - type: cron
    name: ideas-resolver
    runtime: python
    plan: starter
    region: frankfurt
    schedule: "*/30 * * * *"     # every 30 minutes
    buildCommand: pip install -r requirements.txt
    startCommand: python daily.py
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: BYBIT_DEMO_ORDERS
        value: "1"
      - key: BYBIT_DEMO_KEY
        sync: false
      - key: BYBIT_DEMO_SECRET
        sync: false
      - key: ALPACA_KEY
        sync: false
      - key: ALPACA_SECRET
        sync: false

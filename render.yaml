# Render blueprint — push this repo to GitHub, then Render -> New -> Blueprint.
# Provisions: 1 free web (dashboard) + 1 paid worker (runner) + 1 cron (resolver).
# Set DATABASE_URL (Neon pooled), the broker keys, ANTHROPIC/NVIDIA in each service.
services:
  - type: web
    name: signal-dashboard
    runtime: python
    plan: free
    region: frankfurt            # any region ok for the dashboard
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn dashboard_db:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SIZE_USD
        value: "100"

  - type: worker
    name: signal-runner
    runtime: python
    plan: starter                # workers require a paid plan (~$7/mo)
    region: frankfurt            # MUST be non-US — Binance blocks US IPs (HTTP 451)
    buildCommand: pip install -r requirements.txt
    startCommand: python runner.py
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  # The algo-trading heartbeat (daily.py): every 2h it places + resolves the REAL
  # broker bracket batteries — Bybit demo crypto perps (crypto_paper, 24/7) and
  # Alpaca paper equities (equity_paper, market hours). Deterministic, no LLM.
  # Bybit demo + Alpaca paper validate from any region.
  - type: cron
    name: signal-daily
    runtime: python
    plan: starter
    region: frankfurt
    schedule: "30 */2 * * *"     # every 2 hours
    buildCommand: pip install -r requirements.txt
    startCommand: python daily.py
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: BYBIT_DEMO_ORDERS
        value: "1"
      - key: BYBIT_DEMO_KEY
        sync: false
      - key: BYBIT_DEMO_SECRET
        sync: false
      - key: ALPACA_KEY
        sync: false
      - key: ALPACA_SECRET
        sync: false
